<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>המטבח שלי 🍳</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;900&family=Noto+Serif+Hebrew:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-logo">
        <span class="logo-icon">🍳</span>
        <div>
          <h1 class="site-title">המטבח שלי</h1>
          <p class="site-subtitle">אוסף המתכונים האישי שלי</p>
        </div>
      </div>
      <button class="btn-add-recipe" id="btnOpenForm">
        <span>+ מתכון חדש</span>
      </button>
    </div>
  </header>

  <!-- Search & Filter Bar -->
  <div class="toolbar">
    <div class="toolbar-inner">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-input" placeholder="חפש מתכון..." />
      </div>
      <div class="category-tabs" id="categoryTabs">
        <button class="cat-tab active" data-cat="הכל">הכל</button>
        <button class="cat-tab" data-cat="ארוחת בוקר">ארוחת בוקר</button>
        <button class="cat-tab" data-cat="עיקרית">עיקרית</button>
        <button class="cat-tab" data-cat="מרק">מרק</button>
        <button class="cat-tab" data-cat="סלט">סלט</button>
        <button class="cat-tab" data-cat="קינוח">קינוח</button>
        <button class="cat-tab" data-cat="אפייה">אפייה</button>
        <button class="cat-tab" data-cat="כללי">כללי</button>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main-content">
    <div id="recipesGrid" class="recipes-grid">
      <!-- Cards injected by JS -->
    </div>
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="empty-icon">👨‍🍳</div>
      <h2>עדיין אין מתכונים</h2>
      <p>לחץ על "מתכון חדש" כדי להתחיל את האוסף שלך</p>
    </div>
    <div id="loadingState" class="loading-state">
      <div class="spinner"></div>
      <p>טוען מתכונים...</p>
    </div>
  </main>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="recipeModal">
      <button class="modal-close" id="btnCloseModal">✕</button>
      <div class="modal-body" id="modalBody">
        <!-- Content injected by JS -->
      </div>
    </div>
  </div>

  <!-- Add/Edit Recipe Drawer -->
  <div class="drawer-overlay" id="drawerOverlay">
    <div class="drawer" id="formDrawer">
      <div class="drawer-header">
        <h2 id="formTitle">הוספת מתכון חדש</h2>
        <button class="drawer-close" id="btnCloseDrawer">✕</button>
      </div>
      <form class="recipe-form" id="recipeForm" onsubmit="return false;">
        <input type="hidden" id="editId" />

        <div class="form-group">
          <label for="fTitle">שם המתכון *</label>
          <input type="text" id="fTitle" placeholder="למשל: פסטה ברוטב עגבניות" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="fCategory">קטגוריה</label>
            <select id="fCategory">
              <option value="כללי">כללי</option>
              <option value="ארוחת בוקר">ארוחת בוקר</option>
              <option value="עיקרית">עיקרית</option>
              <option value="מרק">מרק</option>
              <option value="סלט">סלט</option>
              <option value="קינוח">קינוח</option>
              <option value="אפייה">אפייה</option>
            </select>
          </div>
          <div class="form-group">
            <label for="fPrepTime">זמן הכנה</label>
            <input type="text" id="fPrepTime" placeholder="למשל: 30 דקות" />
          </div>
        </div>

        <div class="form-group">
          <label for="fDescription">תיאור קצר</label>
          <input type="text" id="fDescription" placeholder="תיאור קצר ומפתה..." />
        </div>

        <div class="form-group">
          <label for="fIngredients">מצרכים * <small>(כל מצרך בשורה נפרדת)</small></label>
          <textarea id="fIngredients" rows="6" placeholder="חבילת פסטה&#10;2 עגבניות&#10;שן שום&#10;מלח ופלפל" required></textarea>
        </div>

        <div class="form-group">
          <label for="fInstructions">אופן הכנה * <small>(כל שלב בשורה נפרדת)</small></label>
          <textarea id="fInstructions" rows="8" placeholder="מבשלים את הפסטה לפי ההוראות&#10;מטגנים את השום בשמן&#10;מוסיפים את העגבניות&#10;מערבבים עם הפסטה" required></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-secondary" id="btnCancelForm">ביטול</button>
          <button type="submit" class="btn-primary" id="btnSubmitForm">💾 שמור מתכון</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
